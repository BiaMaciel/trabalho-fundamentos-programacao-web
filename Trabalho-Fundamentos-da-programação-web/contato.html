<body>

     <!--MENU-NAVEGAÇÃO-->

    <!--CONTATO-->
    <section class="contato">

        <!--FORMULARIO CONTATO-->
        <form class="form-contato">

            <h2>Entre em contato</h2>

            <label for="nome">
                Nome:
            </label>

            <input type="email" placeholder="Digite seu nome completo" required>

            <label for="email">
                E-mail:
            </label>

            <input type="email" placeholder="Digite seu e-mail" required>

            <label for="mensagem">
                Mensagem:
            </label>

            <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem..." rows="5" required></textarea>

            <button type="submit">Enviar</button>

        </form><!--FIM-FORMULARIO CONTATO-->

        <div class="imagem-contato">
            <img src="imagens/Full inbox-bro.svg">
        </div>

    </section>
    
</body>
